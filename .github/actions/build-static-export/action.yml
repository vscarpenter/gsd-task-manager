name: 'Build Static Export'
description: 'Build the Next.js static export and optionally upload as artifact'

inputs:
  artifact-name:
    description: 'Name for the artifact (empty to skip upload)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Prefer IPv4 for npm registry
      shell: bash
      run: echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Build static export
      shell: bash
      run: |
        export NEXT_DISABLE_SWC_BINARY=1
        export NEXT_CACHE_DIR="$(pwd)/.next-cache"
        rm -rf .next-cache .next out
        mkdir -p .next-cache
        bun run build

    - name: Upload artifact
      if: inputs.artifact-name != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: out/
        retention-days: 1