name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history required for SonarCloud blame data and new code detection
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prefer IPv4 for npm registry
        run: echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test -- --coverage --reporter=verbose
        env:
          CI: true

      - name: Disable SonarCloud Automatic Analysis via API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/settings/set?key=sonar.autoscan&value=false&component=vscarpenter_gsd-task-manager")
          echo "Settings API response: $response"
        continue-on-error: true

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.scanner.automaticAnalysis=false
