name: OpenWiki Update

# Keeps the /openwiki documentation in sync with the codebase.
#
# Triggers:
#   - Push to main (post-merge) — refreshes docs right after changes land.
#   - Manual dispatch — run on demand, optionally with a focus message.
#
# The job runs `openwiki --update`, rebuilds the rendered HTML site, and opens a
# pull request with any resulting changes. It intentionally does NOT push straight
# to main: AI-generated doc edits get a human review, and there is no risk of a
# push -> CI -> push loop on a protected branch.
#
# ─── Required repository configuration ──────────────────────────────────────────
#   Secret:  OPENWIKI_API_KEY   -> OpenRouter API key (sk-or-...). The CLI only
#                                  reads OPENROUTER_API_KEY in non-interactive
#                                  runs, so the secret is exported under that name.
#   Setting: Allow GitHub Actions to create and approve pull requests
#            (Settings -> Actions -> General -> Workflow permissions).
# ────────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    # Only re-run when things that affect documentation actually change.
    # Adjust these globs if your docs should track other areas.
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "packages/**"
      - "scripts/**"
      - "docker/**"
      - "docs/**"
      - "*.md"
      - "package.json"
      - "next.config.ts"
      # Never let this workflow trigger itself: openwiki commits touch /openwiki
      # and the site generator, both excluded below.
      - "!openwiki/**"
      - "!scripts/build-openwiki-site.cjs"
  workflow_dispatch:
    inputs:
      message:
        description: "Optional focus/instruction passed to `openwiki --update`"
        required: false
        type: string

# Never run two updates at once; the newer push/manual run wins.
concurrency:
  group: openwiki-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # commit doc changes to the PR branch
      pull-requests: write # open/update the PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so OpenWiki can inspect commits since its last run
          # (it reads gitHead from openwiki/.last-update.json).
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prefer IPv4 for npm registry
        run: echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run OpenWiki update
        env:
          # The CLI hard-requires OPENROUTER_API_KEY when running non-interactively;
          # OPENWIKI_API_KEY / ANTHROPIC_API_KEY are never read in CI.
          OPENROUTER_API_KEY: ${{ secrets.OPENWIKI_API_KEY }}
          # Non-interactive so the CLI never blocks waiting for input in CI.
          CI: "true"
        run: |
          set -euo pipefail
          MSG="${{ github.event.inputs.message }}"
          # `bunx` runs the published CLI without adding it as a project dependency.
          # `--` forwards the flags to openwiki. -p keeps it one-shot / non-interactive.
          if [ -n "$MSG" ]; then
            bunx openwiki --update "$MSG"
          else
            bunx openwiki --update
          fi

      - name: Rebuild rendered docs site
        run: bun run build:docs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          # Uses the default GITHUB_TOKEN. Note: PRs opened by GITHUB_TOKEN do not
          # themselves trigger further workflow runs (prevents CI recursion).
          commit-message: "docs(openwiki): automated documentation update"
          branch: chore/openwiki-update
          delete-branch: true
          title: "docs(openwiki): automated documentation update"
          labels: documentation, automated
          body: |
            Automated OpenWiki refresh.

            - Trigger: `${{ github.event_name }}`
            - Ran `openwiki --update` and rebuilt the rendered HTML site (`bun run build:docs`).

            Please review the doc changes for accuracy before merging. If nothing
            changed, this PR will not be created.
          add-paths: |
            openwiki/**
            AGENTS.md
            CLAUDE.md
