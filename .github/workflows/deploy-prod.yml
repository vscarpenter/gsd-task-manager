name: Deploy to Production

on:
  # Tag-triggered release: v*.*.*. The job verifies the tagged commit is on main.
  # Matches the package.json semver (e.g. v9.1.11 → 9.1.11).
  push:
    tags: ['v*.*.*']
  # Manual override — useful for re-deploying a reviewed main ref.
  workflow_dispatch:

# Locked decision §7.7: queue overlapping deploys, never cancel.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Ungated pre-gate job: surfaces release evidence (version + rollback command)
  # to the Gate 2 approver via the run summary. Runs before the gated deploy job,
  # holds no secrets and no deploy powers — it only reads and summarizes.
  evidence:
    name: Gate 2 evidence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute release evidence
        env:
          TAG_REF: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          DEV_URL: ${{ vars.DEV_SITE_URL }}
        run: |
          if [ "$EVENT" = "push" ]; then VERSION="${TAG_REF#v}"; else VERSION="$(node -p "require('./package.json').version")"; fi
          git fetch --tags --quiet || true
          TAGS="$(git tag -l 'v*.*.*' | tr '\n' ' ')"
          PREV="$(node -e 'const {prevReleaseTag}=require("./scripts/prev-release-tag.cjs"); const p=prevReleaseTag(process.argv[1], process.argv[2].split(/\s+/).filter(Boolean)); process.stdout.write(p||"")' "$VERSION" "$TAGS")"
          {
            echo "## Gate 2 — release evidence"
            echo ""
            echo "**Deploying:** \`v$VERSION\`"
            if [ -n "$PREV" ]; then
              echo "**Previous prod:** \`$PREV\`"
              echo ""
              echo "**Rollback** (if this deploy misbehaves) — redeploys the previous release through this same gated path:"
              echo '```'
              echo "gh workflow run deploy-prod.yml --ref $PREV"
              echo '```'
            else
              echo "**Previous prod:** none found (first release) — roll back by redeploying an earlier good commit."
            fi
            echo ""
            echo "**Preview:** ${DEV_URL:-the dev environment} (test before approving; it already has this build after merge)."
            echo "**Post-deploy:** \`smoke-test.sh\` runs automatically after the invalidation completes."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to production
    needs: evidence
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # The `production` environment carries the required-reviewer gate
    # (locked decision §7.5). The job pauses for human approval before
    # any of these steps run — no compute wasted on rejected deploys.
    environment:
      name: production
      url: ${{ vars.SITE_URL }}
    permissions:
      id-token: write   # OIDC token for AWS role assumption
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify deployment ref is on main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          DEPLOY_COMMIT=$(git rev-parse "${GITHUB_SHA}^{commit}")
          if ! git merge-base --is-ancestor "$DEPLOY_COMMIT" origin/main; then
            echo "::error::Deployment commit $DEPLOY_COMMIT is not reachable from origin/main"
            exit 1
          fi

      # Mirrors publish-mcp-server.yml's tag-vs-package.json check.
      # Stops a v9.1.11 tag from accidentally deploying a 9.1.10 build.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_REF#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Deploying version $PKG_VERSION"
          echo "## Deploying v$PKG_VERSION to production" >> "$GITHUB_STEP_SUMMARY"

      # Always rebuild for prod — older release tags might not have retained
      # 14-day artifact retention from CI can't be relied on for older tags.
      # The build is deterministic from the tree, so this produces the same
      # bytes CI built when the tagged commit was on main.
      - name: Build static export
        uses: ./.github/actions/build-static-export

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3 + create CloudFront invalidation
        id: deploy
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          CLOUDFRONT_ID: ${{ vars.CLOUDFRONT_ID }}
          ENV_LABEL: ${{ vars.ENV_LABEL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: bash scripts/deploy-app.sh

      - name: Wait for CloudFront invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ vars.CLOUDFRONT_ID }}" \
            --id "${{ steps.deploy.outputs.invalidation_id }}"

      - name: Smoke test
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: bash scripts/smoke-test.sh
