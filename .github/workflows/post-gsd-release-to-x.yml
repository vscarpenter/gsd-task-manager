name: Post GSD Release to X

# Composes a draft X post from a published GitHub Release (or a manual dispatch),
# previews it in the job summary, and publishes to @GSDTaskManager ONLY after the
# `social-gsd-x` environment is approved. See docs/social-publishing.md.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compose and preview only; do not publish"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      post_text:
        description: "Optional exact post text. If supplied, use this instead of generated release text."
        required: false
        type: string
      release_url:
        description: "Optional release URL to include when using manual post text."
        required: false
        type: string

permissions:
  contents: read

jobs:
  compose:
    # Never run on forks; release/dispatch on the canonical repo only.
    if: github.repository == 'vscarpenter/gsd-task-manager'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/social-publisher
    outputs:
      length: ${{ steps.compose.outputs.length }}
      dry_run: ${{ steps.compose.outputs.dry_run }}
      publishable: ${{ steps.compose.outputs.publishable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install (isolated package)
        run: npm ci --ignore-scripts

      - name: Compose draft post
        id: compose
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          APP_NAME: GSD Task Manager
          X_ACCOUNT_HANDLE: GSDTaskManager
          MAX_POST_CHARS: "280"
        run: node src/compose-post.mjs --out post.txt

      - name: Upload draft post
        uses: actions/upload-artifact@v4
        with:
          name: gsd-draft-post
          path: tools/social-publisher/post.txt
          retention-days: 7

  publish:
    needs: compose
    # Publish only for a release, or a manual dispatch with dry_run=false, and
    # only when compose produced a real (non-sample) post. The environment adds
    # the human approval gate; nothing posts until it is approved.
    if: >
      github.repository == 'vscarpenter/gsd-task-manager' &&
      needs.compose.outputs.publishable == 'true' &&
      ( github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') )
    runs-on: ubuntu-latest
    environment:
      name: social-gsd-x
    defaults:
      run:
        working-directory: tools/social-publisher
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install (isolated package)
        run: npm ci --ignore-scripts

      - name: Download draft post
        uses: actions/download-artifact@v4
        with:
          name: gsd-draft-post
          path: tools/social-publisher

      - name: Publish to X
        id: publish
        env:
          DRY_RUN: "false"
          X_ACCOUNT_HANDLE: GSDTaskManager
          MAX_POST_CHARS: "280"
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          # TEMP DIAGNOSTIC (debug/social-x-auth-probe only): prints credential
          # lengths/shape (never the values — GitHub still masks those) and does a
          # read-only v2.me() auth check to distinguish bad values from app config.
          # Does NOT post. Revert before merging.
          node -e '
          import("twitter-api-v2").then(async ({TwitterApi}) => {
            const need=["X_API_KEY","X_API_SECRET","X_ACCESS_TOKEN","X_ACCESS_TOKEN_SECRET"];
            for (const k of need){const v=process.env[k]||""; console.log(k,"len="+v.length,"trimmed_len="+v.trim().length);}
            console.log("access_token_shape_ok:", /^[0-9]+-/.test(process.env.X_ACCESS_TOKEN||""));
            const c=new TwitterApi({appKey:process.env.X_API_KEY,appSecret:process.env.X_API_SECRET,accessToken:process.env.X_ACCESS_TOKEN,accessSecret:process.env.X_ACCESS_TOKEN_SECRET});
            try{const me=await c.v2.me(); console.log("AUTH_OK as @"+me.data.username);}
            catch(e){console.log("AUTH_FAIL code="+(e.code||e.status)); console.log("X_SAYS:", JSON.stringify(e.data||e.message));}
          });'
