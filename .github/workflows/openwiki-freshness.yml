name: OpenWiki Freshness

# Non-blocking check: annotates a PR when doc-affecting source has changed since OpenWiki
# last documented the repo (tracked in openwiki/.last-update.json). It NEVER fails the build
# — the sibling `openwiki-update.yml` workflow (nightly + post-merge) is what actually
# refreshes the docs. This job just makes drift visible on the PR.

on:
  pull_request:
    # Only bother checking when files that affect documentation actually change.
    # Mirrors the trigger paths in openwiki-update.yml; openwiki's own output is excluded
    # so the automated doc-update PR never trips its own freshness check.
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "packages/**"
      - "scripts/**"
      - "docker/**"
      - "docs/**"
      - "*.md"
      - "package.json"
      - "next.config.ts"
      - "!openwiki/**"
      - "!scripts/build-openwiki-site.cjs"
  workflow_dispatch:

permissions:
  contents: read # the check reads git history only; no API writes

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the gitHead recorded in openwiki/.last-update.json is reachable.
          fetch-depth: 0

      - name: Check OpenWiki freshness
        run: bash scripts/check-openwiki-freshness.sh
