sonar.projectKey=vscarpenter_gsd-task-manager
sonar.organization=vscarpenter
sonar.projectName=GSD Task Manager

# Source and test directories
sonar.sources=app,components,lib,packages
sonar.tests=tests

# Exclusions from source analysis
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/tests/**,\
  **/__tests__/**,\
  **/__mocks__/**

# Test file patterns
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  tests/**/*

# Coverage exclusions — files that are analyzed for bugs/smells but are not
# expected to carry unit-test coverage. These mirror the coverage `exclude`
# list in vitest.config.ts so both tools apply the same policy:
#   - components/ui/** are thin shadcn/Radix wrappers (third-party abstractions)
#   - barrels and type-only modules have no executable logic
#   - generated/config/test-helper files are not product code
sonar.coverage.exclusions=\
  **/components/ui/**,\
  **/types.ts,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/index.ts,\
  packages/mcp-server/test-env-vars.js,\
  packages/mcp-server/decode-jwt.cjs

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage report paths (generated by Vitest with --coverage flag).
# The MCP package has its own suite; its lcov SF paths are rewritten to be
# repo-root-relative in the SonarCloud workflow so they map here.
sonar.javascript.lcov.reportPaths=coverage/lcov.info,packages/mcp-server/coverage/lcov.info
